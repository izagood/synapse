[package]
name = "synapse"
version = "0.1.0"
edition = "2021"
description = "Synapse — Notion-style note app that saves plain Markdown, synced via GitHub"

[lib]
name = "synapse_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
synapse-core = { path = "../crates/synapse-core" }
dirs = "5"
