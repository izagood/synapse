# 태그(v*)를 푸시하면 macOS 유니버설(.dmg, Intel+Apple Silicon)과 Windows MSI를
# GitHub Releases에 자동 업로드한다.
#
# 사전 준비 (1회):
#   리포지토리 Settings → Secrets and variables → Actions 에
#   SYNAPSE_GITHUB_CLIENT_ID = GitHub OAuth App의 Client ID (Device Flow 활성화)
#
# 코드 서명 (1회, 선택이지만 강력 권장):
#   ad-hoc 서명은 빌드마다 서명이 달라져 업데이트할 때마다 키체인
#   "항상 허용"이 무효화된다. Apple 개발자 등록 없이도 셀프사인 인증서로
#   서명을 고정하면 최초 1회 허용 후 다시 묻지 않는다.
#     1. 키체인 접근.app → 메뉴 키체인 접근 → 인증서 지원 → 인증서 생성...
#        이름: Synapse Self Sign / 인증서 유형: 코드 서명 /
#        "기본값 무시" 체크 → 유효 기간 3650일
#     2. 키체인 접근에서 해당 인증서를 우클릭 → 내보내기 → .p12 (암호 설정)
#        base64 -i synapse-sign.p12 | pbcopy
#     3. Secrets에 등록:
#        APPLE_CERTIFICATE          = (위에서 복사한 base64)
#        APPLE_CERTIFICATE_PASSWORD = .p12 내보내기 암호
#        APPLE_SIGNING_IDENTITY     = Synapse Self Sign
#   시크릿이 없으면 기존처럼 ad-hoc 서명으로 빌드된다 (동작은 동일, 키체인
#   프롬프트만 업데이트마다 재발).
#
# 릴리스 방법:
#   - 자동: PR이 CI를 통과하고 main에 merge되면 auto-release.yml이 버전을 올리고
#     태그를 만든 뒤 이 워크플로를 dispatch한다 (태그 ref로 실행됨)
#   - 수동: git tag v0.1.0 && git push origin v0.1.0
name: Release (Desktop)

on:
  push:
    tags: ["v*"]
  # auto-release.yml이 태그 ref로 dispatch한다
  # (GITHUB_TOKEN으로 푸시한 태그는 push 트리거를 발동시키지 않으므로)
  workflow_dispatch:

permissions:
  contents: write

# 같은 태그에 대한 중복 실행 방지 (예: 수동 dispatch가 겹친 경우).
# 빌드 전체의 직렬화는 auto-release.yml이 완료 대기로 담당한다 —
# 전역 그룹으로 묶으면 GitHub이 초과 pending 런을 취소해 해당 태그의 릴리스가
# 통째로 사라질 수 있으므로 여기서는 태그 단위로만 묶는다.
concurrency:
  group: release-macos-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - os: macos-14
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_note: macOS용 설치 파일(.dmg)입니다. Intel/Apple Silicon 모두 지원합니다.
          - os: windows-latest
            args: ""
            rust_targets: ""
            artifact_note: Windows용 설치 파일(.msi)입니다.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust_targets != ''
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust_targets == ''

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # macOS 코드 서명 — 셀프사인 인증서 (파일 상단 "코드 서명" 주석 참고).
      # 주의: tauri의 APPLE_CERTIFICATE 자동 import는 Apple 발급 인증서
      # 이름("Developer ID Application:" 등)만 인식해 셀프사인 인증서로는
      # "failed to resolve signing identity"로 실패한다. 그래서 키체인
      # 구성은 여기서 직접 하고, tauri에는 APPLE_SIGNING_IDENTITY만 넘겨
      # `codesign -s <이름>`이 키체인 검색 목록에서 인증서를 찾게 한다.
      - name: macOS 코드 서명 키체인 구성 (시크릿 있을 때만)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            CERT_P12="$RUNNER_TEMP/signing-cert.p12"
            CERT_PEM="$RUNNER_TEMP/signing-cert.pem"
            KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
            KEYCHAIN_PW="$(openssl rand -hex 16)"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 3600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security import "$CERT_P12" -k "$KEYCHAIN" \
              -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN" > /dev/null
            security list-keychains -d user -s "$KEYCHAIN" \
              $(security list-keychains -d user | sed 's/["[:space:]]//g')
            # 셀프사인 인증서는 신뢰 앵커가 아니라서 그대로는 유효한
            # 서명 ID로 인식되지 않는다 — 시스템 키체인에 신뢰 루트로 등록
            openssl pkcs12 -in "$CERT_P12" -clcerts -nokeys \
              -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out "$CERT_PEM" \
              || openssl pkcs12 -legacy -in "$CERT_P12" -clcerts -nokeys \
                -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out "$CERT_PEM"
            sudo security add-trusted-cert -d -r trustRoot \
              -k /Library/Keychains/System.keychain "$CERT_PEM"
            rm -f "$CERT_P12" "$CERT_PEM"
            if ! security find-identity -v -p codesigning "$KEYCHAIN" \
                | grep -qF "$APPLE_SIGNING_IDENTITY"; then
              echo "::error::APPLE_SIGNING_IDENTITY와 일치하는 유효한 서명 ID가 키체인에 없습니다"
              security find-identity -p codesigning "$KEYCHAIN"
              exit 1
            fi
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNAPSE_GITHUB_CLIENT_ID: ${{ secrets.SYNAPSE_GITHUB_CLIENT_ID }}
          # 원클릭 업데이트 아티팩트 서명 (tauri signer로 생성한 키)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Synapse ${{ github.ref_name }}"
          releaseBody: |
            Synapse 데스크톱 설치 파일입니다.

            - macOS: `.dmg` 파일을 받으세요. Intel/Apple Silicon 모두 지원합니다.
            - Windows: `.msi` 파일을 받으세요.

            서명되지 않은 빌드는 OS가 첫 실행을 차단할 수 있습니다. 자세한 내용은 패키징 가이드를 확인하세요.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      # GitHub의 "latest" 릴리스는 생성 순서 기준이라, 빌드가 순서를 어겨 끝나면
      # 구버전이 latest가 되어 업데이터(latest.json)가 구버전을 가리킬 수 있다.
      # 이 태그가 semver 최고 버전일 때만 latest로 못 박아 순서 역전을 방지한다.
  finalize:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: latest 릴리스 포인터 보정
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          highest=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq '.[] | select((.draft or .prerelease) | not) | .tag_name' | sort -V | tail -1)
          if [ "$tag" = "$highest" ]; then
            release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$tag" --jq .id)
            gh api -X PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
              -f make_latest=true >/dev/null
            echo "latest → $tag"
          else
            echo "최고 버전($highest)이 아니므로 latest는 그대로 둠"
          fi
