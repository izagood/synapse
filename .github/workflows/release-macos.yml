# 태그(v*)를 푸시하면 macOS 유니버설(.dmg, Intel+Apple Silicon) 빌드를
# GitHub Releases에 자동 업로드한다.
#
# 사전 준비 (1회):
#   리포지토리 Settings → Secrets and variables → Actions 에
#   SYNAPSE_GITHUB_CLIENT_ID = GitHub OAuth App의 Client ID (Device Flow 활성화)
#
# 코드 서명 (1회, 선택이지만 강력 권장):
#   ad-hoc 서명은 빌드마다 서명이 달라져 업데이트할 때마다 키체인
#   "항상 허용"이 무효화된다. Apple 개발자 등록 없이도 셀프사인 인증서로
#   서명을 고정하면 최초 1회 허용 후 다시 묻지 않는다.
#     1. 키체인 접근.app → 메뉴 키체인 접근 → 인증서 지원 → 인증서 생성...
#        이름: Synapse Self Sign / 인증서 유형: 코드 서명 /
#        "기본값 무시" 체크 → 유효 기간 3650일
#     2. 키체인 접근에서 해당 인증서를 우클릭 → 내보내기 → .p12 (암호 설정)
#        base64 -i synapse-sign.p12 | pbcopy
#     3. Secrets에 등록:
#        APPLE_CERTIFICATE          = (위에서 복사한 base64)
#        APPLE_CERTIFICATE_PASSWORD = .p12 내보내기 암호
#        APPLE_SIGNING_IDENTITY     = Synapse Self Sign
#   시크릿이 없으면 기존처럼 ad-hoc 서명으로 빌드된다 (동작은 동일, 키체인
#   프롬프트만 업데이트마다 재발).
#
# 릴리스 방법:
#   - 자동: PR이 CI를 통과하고 main에 merge되면 auto-release.yml이 버전을 올리고
#     태그를 만든 뒤 이 워크플로를 dispatch한다 (태그 ref로 실행됨)
#   - 수동: git tag v0.1.0 && git push origin v0.1.0
name: Release (macOS)

on:
  push:
    tags: ["v*"]
  # auto-release.yml이 태그 ref로 dispatch한다
  # (GITHUB_TOKEN으로 푸시한 태그는 push 트리거를 발동시키지 않으므로)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # macOS 코드 서명 — 셀프사인 인증서 (파일 상단 "코드 서명" 주석 참고).
      # 주의: tauri-action의 env에 직접 넣으면 시크릿 미등록 시 "빈 값으로
      # 설정"되는데, tauri 번들러는 빈 값이어도 인증서 import를 시도하다
      # 실패한다. 값이 있을 때만 GITHUB_ENV로 주입한다.
      - name: macOS 코드 서명 시크릿 주입 (있을 때만)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            {
              echo "APPLE_CERTIFICATE<<__CERT_EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__CERT_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            } >> "$GITHUB_ENV"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNAPSE_GITHUB_CLIENT_ID: ${{ secrets.SYNAPSE_GITHUB_CLIENT_ID }}
          # 원클릭 업데이트 아티팩트 서명 (tauri signer로 생성한 키)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Synapse ${{ github.ref_name }}"
          releaseBody: |
            macOS용 설치 파일(.dmg)입니다. Intel/Apple Silicon 모두 지원합니다.

            서명되지 않은 앱이므로 첫 실행 시 macOS가 차단할 수 있습니다 —
            앱을 우클릭 → 열기, 또는 터미널에서
            `xattr -cr /Applications/Synapse.app` 후 실행하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
