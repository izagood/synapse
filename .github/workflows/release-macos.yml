# 태그(v*)를 푸시하면 macOS 유니버설(.dmg, Intel+Apple Silicon) 빌드를
# GitHub Releases에 자동 업로드한다.
#
# 사전 준비 (1회):
#   리포지토리 Settings → Secrets and variables → Actions 에
#   SYNAPSE_GITHUB_CLIENT_ID = GitHub OAuth App의 Client ID (Device Flow 활성화)
#
# 릴리스 방법:
#   git tag v0.1.0 && git push origin v0.1.0
name: Release (macOS)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNAPSE_GITHUB_CLIENT_ID: ${{ secrets.SYNAPSE_GITHUB_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Synapse ${{ github.ref_name }}"
          releaseBody: |
            macOS용 설치 파일(.dmg)입니다. Intel/Apple Silicon 모두 지원합니다.

            서명되지 않은 앱이므로 첫 실행 시 macOS가 차단할 수 있습니다 —
            앱을 우클릭 → 열기, 또는 터미널에서
            `xattr -cr /Applications/Synapse.app` 후 실행하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin
