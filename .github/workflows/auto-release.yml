# main에서 CI가 성공하면(= PR이 CI를 통과하고 merge되면) 자동으로 릴리스한다.
#
# 동작:
#   1. package.json의 버전이 이미 태그로 존재하면 patch 버전을 자동 증가
#      (PR에서 직접 버전을 올렸다면 그 버전을 그대로 사용 — minor/major 릴리스 방법)
#   2. 버전 파일(package.json, tauri.conf.json, Cargo.toml, Cargo.lock)을 갱신해 main에 커밋
#   3. vX.Y.Z 태그를 푸시하고 GitHub Release draft를 선생성
#   4. Release (Desktop) reusable workflow를 같은 run 안에서 호출
#
# 주의: GITHUB_TOKEN으로 푸시한 커밋/태그는 다른 워크플로를 트리거하지 않으므로
#   (GitHub의 재귀 방지 정책) 태그 푸시 대신 workflow_call로 릴리스를 실행하며,
#   같은 이유로 버전 bump 커밋이 CI → 릴리스를 다시 트리거하는 루프도 생기지 않는다.
name: Auto Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write # 버전 bump 커밋 + 태그 푸시

# 연속 merge 시 릴리스가 겹치지 않게 직렬화.
# 이 워크플로가 Release (Desktop) 빌드까지 포함하므로 릴리스 전체가 함께 직렬화된다 —
# 대기 중 들어온 merge들은 GitHub이 pending 런 하나로 합쳐 다음 릴리스에 배칭된다.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  prepare-release:
    # main 브랜치 push(= PR merge)로 돌았던 CI가 성공한 경우에만
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0 # 태그 조회용

      - name: 다음 버전 계산
        id: version
        run: |
          set -euo pipefail
          current=$(node -p "require('./package.json').version")
          if git rev-parse -q --verify "refs/tags/v$current" >/dev/null; then
            next=$(node -p "const [a,b,c]='$current'.split('.'); [a,b,+c+1].join('.')")
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            # PR에서 이미 버전을 올림 — 그대로 릴리스
            next=$current
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
          echo "릴리스 버전: v$next"

      - name: 버전 파일 갱신 및 커밋
        if: steps.version.outputs.bumped == 'true'
        run: |
          set -euo pipefail
          v="${{ steps.version.outputs.next }}"
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$v';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "
          sed -i "0,/^version = \".*\"/s//version = \"$v\"/" src-tauri/Cargo.toml
          # Cargo.lock의 synapse 항목도 맞춰둔다 (빌드 시 재생성되지만 diff 노이즈 방지)
          sed -i "/^name = \"synapse\"$/{n;s/^version = \".*\"/version = \"$v\"/}" src-tauri/Cargo.lock
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v$v"
          # push 직전에 다른 PR이 merge되면 non-fast-forward로 실패한다 — rebase 후 재시도
          for i in 1 2 3; do
            if git push origin main; then
              exit 0
            fi
            echo "push 실패 (시도 $i/3) — 새 커밋과 경합, rebase 후 재시도"
            git pull --rebase origin main || {
              git rebase --abort
              echo "rebase 충돌 (경합한 merge도 버전 파일을 변경함) — 이번 릴리스는 건너뜀."
              echo "경합한 merge의 CI가 성공하면 다음 Auto Release 런이 두 변경을 함께 릴리스한다."
              exit 1
            }
          done
          echo "push 3회 실패 — 다음 Auto Release 런이 처리한다"
          exit 1

      - name: 태그 푸시 및 draft 릴리스 생성
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          v="v${{ steps.version.outputs.next }}"
          git tag "$v"
          git push origin "$v"
          if gh release view "$v" >/dev/null 2>&1; then
            echo "GitHub Release가 이미 존재함: $v"
          else
            notes_file="$RUNNER_TEMP/release-notes.md"
            cat > "$notes_file" <<'EOF'
          Synapse 데스크톱 설치 파일입니다.

          - macOS: `.dmg` 파일을 받으세요. Intel/Apple Silicon 모두 지원합니다.
          - Windows: `.msi` 파일을 받으세요.

          서명되지 않은 빌드는 OS가 첫 실행을 차단할 수 있습니다. 자세한 내용은 패키징 가이드를 확인하세요.
          EOF
            gh release create "$v" \
              --title "Synapse $v" \
              --notes-file "$notes_file" \
              --draft \
              --verify-tag
            echo "GitHub Release draft 선생성됨: $v"
          fi
          echo "release_tag=$v" >> "$GITHUB_OUTPUT"
          echo "Release (Desktop) reusable workflow 실행 준비됨: $v"

  build-desktop:
    needs: prepare-release
    if: needs.prepare-release.outputs.release_tag != ''
    permissions:
      contents: write
    uses: ./.github/workflows/release-desktop.yml
    with:
      release_tag: ${{ needs.prepare-release.outputs.release_tag }}
    secrets: inherit

  cleanup-failed-release:
    needs: [prepare-release, build-desktop]
    # 빌드가 실패했을 때뿐 아니라 취소됐을 때도 정리한다. cancel-in-progress: false
    # 덕에 큐에서 대기하다 취소되는 런은 job을 시작조차 안 해 잔해가 없지만,
    # prepare-release가 commit/tag/draft를 만든 뒤 실행 중에 취소되는 경우
    # (수동/강제/타임아웃)에는 미완료 draft가 남는다. failure()는 cancelled를
    # 포함하지 않으므로 둘 다 명시한다.
    if: (failure() || cancelled()) && needs.prepare-release.outputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: 미완료 draft 릴리스와 태그 정리
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
        run: |
          set -euo pipefail
          # REST get-by-tag는 draft를 반환하지 않으므로(404) draft도 포함하는
          # 목록 엔드포인트에서 찾는다. draft인 것만 골라 정리 — 안 그러면 빌드
          # 실패/취소로 남은 draft가 정리되지 않고 영원히 쌓인다.
          # (이 잡은 checkout이 없어 git 저장소가 없으므로 repo를 명시하는
          #  `gh api`만 쓸 수 있다. `gh release ...`는 git 리모트 추론에 실패한다.)
          draft_id=$(gh api "repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            --jq "first(.[] | select(.tag_name == \"$RELEASE_TAG\" and .draft)) | .id")
          if [ -z "$draft_id" ]; then
            # draft가 없으면 이미 finalize가 공개한 릴리스 — 절대 건드리지 않는다.
            echo "공개된 릴리스이거나 draft를 찾지 못해 정리하지 않음: $RELEASE_TAG"
            exit 0
          fi
          echo "미완료 draft 정리: $RELEASE_TAG (id=$draft_id)"
          gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/$draft_id"
          # 태그도 지운다. 버전 bump 커밋(chore(release): X.Y.Z)은 main에 남으므로
          # 다음 Auto Release가 같은 버전을 태그 없는 상태로 보고 재시도한다 →
          # 버전 번호가 건너뛰어지지 않고 그대로 다시 릴리스된다.
          if gh api "repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG"
            echo "태그 삭제: $RELEASE_TAG (다음 Auto Release가 같은 버전으로 재시도)"
          fi
