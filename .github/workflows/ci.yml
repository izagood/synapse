name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # 릴리스는 세 파일의 버전이 같아야 한다 — 어긋나면 PR 단계에서 잡는다
      - name: 버전 일치 검사 (package.json / tauri.conf.json / Cargo.toml)
        run: |
          node -e '
            const fs = require("fs");
            const pkg = require("./package.json").version;
            const tauri = require("./src-tauri/tauri.conf.json").version;
            const cargo = fs.readFileSync("./src-tauri/Cargo.toml", "utf8")
              .match(/^version = "([^"]+)"/m)[1];
            if (pkg !== tauri || pkg !== cargo) {
              console.error("버전 불일치: package.json=" + pkg
                + " tauri.conf.json=" + tauri + " Cargo.toml=" + cargo);
              process.exit(1);
            }
            console.log("버전 일치: " + pkg);
          '

      # synapse-core는 GUI 의존성이 없어 어떤 러너에서도 테스트 가능
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/synapse-core
      - run: cargo test
        working-directory: crates/synapse-core

  # PR이 릴리즈 가능한 상태인지 검증 — 릴리스 워크플로우(release-macos.yml)와
  # 같은 macOS 번들 빌드를 업로드 없이 드라이런한다. cargo check만 할 때와 달리
  # 번들링·업데이터 아티팩트 생성까지 검증된다.
  # 시간 절약을 위해 universal 대신 러너 네이티브(arm64) 타깃만 빌드한다.
  release-dry-run:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # createUpdaterArtifacts: true 라서 서명 키가 필요하다.
      # 시크릿이 없는 환경(포크에서 온 PR)에서는 업데이터 아티팩트 생성을 끄고 빌드한다.
      # macOS 코드 서명도 릴리스와 동일하게 드라이런한다
      # (셀프사인 인증서 — release-macos.yml 상단 주석 참고. 없으면 ad-hoc)
      # 주의: env에 직접 넣으면 시크릿 미등록 시 "빈 값으로 설정"되는데,
      # tauri 번들러는 빈 값이어도 인증서 import를 시도하다 실패한다.
      # 값이 있을 때만 GITHUB_ENV로 주입한다.
      - name: macOS 코드 서명 시크릿 주입 (있을 때만)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            {
              echo "APPLE_CERTIFICATE<<__CERT_EOF__"
              echo "$APPLE_CERTIFICATE"
              echo "__CERT_EOF__"
              echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
              echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            } >> "$GITHUB_ENV"
            # 셀프사인 인증서는 CI 러너에서 신뢰 앵커가 아니라
            # `security find-identity -v`에 잡히지 않고, tauri가
            # "failed to resolve signing identity"로 실패한다.
            # 시스템 키체인에 신뢰 루트로 등록해 유효한 ID로 만든다.
            echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/signing-cert.p12
            openssl pkcs12 -in /tmp/signing-cert.p12 -clcerts -nokeys \
              -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out /tmp/signing-cert.pem \
              || openssl pkcs12 -legacy -in /tmp/signing-cert.p12 -clcerts -nokeys \
                -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out /tmp/signing-cert.pem
            sudo security add-trusted-cert -d -r trustRoot \
              -k /Library/Keychains/System.keychain /tmp/signing-cert.pem
            rm -f /tmp/signing-cert.p12 /tmp/signing-cert.pem
          fi
      - name: Tauri 번들 빌드 (드라이런)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            npx tauri build --target aarch64-apple-darwin \
              --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            npx tauri build --target aarch64-apple-darwin
          fi
