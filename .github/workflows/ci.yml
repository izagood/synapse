name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # 릴리스는 세 파일의 버전이 같아야 한다 — 어긋나면 PR 단계에서 잡는다
      - name: 버전 일치 검사 (package.json / tauri.conf.json / Cargo.toml)
        run: |
          node -e '
            const fs = require("fs");
            const pkg = require("./package.json").version;
            const tauri = require("./src-tauri/tauri.conf.json").version;
            const cargo = fs.readFileSync("./src-tauri/Cargo.toml", "utf8")
              .match(/^version = "([^"]+)"/m)[1];
            if (pkg !== tauri || pkg !== cargo) {
              console.error("버전 불일치: package.json=" + pkg
                + " tauri.conf.json=" + tauri + " Cargo.toml=" + cargo);
              process.exit(1);
            }
            console.log("버전 일치: " + pkg);
          '

      # synapse-core는 GUI 의존성이 없어 어떤 러너에서도 테스트 가능
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/synapse-core
      - run: cargo fmt --check
        working-directory: crates/synapse-core
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: crates/synapse-core
      - run: cargo test
        working-directory: crates/synapse-core

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/synapse-core
      - run: cargo test
        working-directory: crates/synapse-core

  # PR이 릴리즈 가능한 상태인지 검증 — 릴리스 워크플로우(release-desktop.yml)와
  # 같은 데스크톱 번들 빌드를 업로드 없이 드라이런한다. cargo check만 할 때와 달리
  # 번들링·업데이터 아티팩트 생성까지 검증된다.
  release-dry-run:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin
          - os: windows-latest
            args: ""
            rust_targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust_targets != ''
        with:
          targets: ${{ matrix.rust_targets }}
      - uses: dtolnay/rust-toolchain@stable
        if: matrix.rust_targets == ''
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # createUpdaterArtifacts: true 라서 서명 키가 필요하다.
      # 시크릿이 없는 환경(포크에서 온 PR)에서는 업데이터 아티팩트 생성을 끄고 빌드한다.
      # macOS 코드 서명도 릴리스와 동일하게 드라이런한다
      # (셀프사인 인증서 — release-desktop.yml 상단 주석 참고. 없으면 ad-hoc)
      # 주의: tauri의 APPLE_CERTIFICATE 자동 import는 Apple 발급 인증서
      # 이름("Developer ID Application:" 등)만 인식해 셀프사인 인증서로는
      # "failed to resolve signing identity"로 실패한다. 그래서 키체인
      # 구성은 여기서 직접 하고, tauri에는 APPLE_SIGNING_IDENTITY만 넘겨
      # `codesign -s <이름>`이 키체인 검색 목록에서 인증서를 찾게 한다.
      - name: macOS 코드 서명 키체인 구성 (시크릿 있을 때만)
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            CERT_P12="$RUNNER_TEMP/signing-cert.p12"
            CERT_PEM="$RUNNER_TEMP/signing-cert.pem"
            KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
            KEYCHAIN_PW="$(openssl rand -hex 16)"
            echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_P12"
            security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security set-keychain-settings -lut 3600 "$KEYCHAIN"
            security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
            security import "$CERT_P12" -k "$KEYCHAIN" \
              -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S "apple-tool:,apple:,codesign:" \
              -s -k "$KEYCHAIN_PW" "$KEYCHAIN" > /dev/null
            security list-keychains -d user -s "$KEYCHAIN" \
              $(security list-keychains -d user | sed 's/["[:space:]]//g')
            # 셀프사인 인증서는 신뢰 앵커가 아니라서 그대로는 유효한
            # 서명 ID로 인식되지 않는다 — 시스템 키체인에 신뢰 루트로 등록
            openssl pkcs12 -in "$CERT_P12" -clcerts -nokeys \
              -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out "$CERT_PEM" \
              || openssl pkcs12 -legacy -in "$CERT_P12" -clcerts -nokeys \
                -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -out "$CERT_PEM"
            sudo security add-trusted-cert -d -r trustRoot \
              -k /Library/Keychains/System.keychain "$CERT_PEM"
            rm -f "$CERT_P12" "$CERT_PEM"
            if ! security find-identity -v -p codesigning "$KEYCHAIN" \
                | grep -qF "$APPLE_SIGNING_IDENTITY"; then
              echo "::error::APPLE_SIGNING_IDENTITY와 일치하는 유효한 서명 ID가 키체인에 없습니다"
              security find-identity -p codesigning "$KEYCHAIN"
              exit 1
            fi
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          fi
      - name: Tauri 번들 빌드 (드라이런)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        shell: bash
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            npx tauri build ${{ matrix.args }} \
              --config '{"bundle":{"createUpdaterArtifacts":false}}'
          else
            npx tauri build ${{ matrix.args }}
          fi
